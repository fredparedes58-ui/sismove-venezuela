name: SismoVE · sincronización cada 10 min

# Pinger REAL cada 10 min, robusto al throttle de GitHub:
# GitHub espacia los crons programados (a veces cada varias horas), así que en vez de
# depender del horario, CADA corrida hace un BUCLE de ~5 h pingeando cada 10 min.
# Con concurrency (cancel-in-progress:false) la siguiente corrida se encola y arranca
# al terminar la anterior → cobertura casi continua.
# Secrets (Settings → Secrets → Actions): SCRAPER_WEBHOOK_URL, SCRAPER_WEBHOOK_SECRET.
on:
  schedule:
    - cron: '*/10 * * * *'   # GitHub lo dispara cuando puede; el bucle cubre los huecos
  workflow_dispatch: {}

concurrency:
  group: sismove-cron
  cancel-in-progress: false   # encola la siguiente; no corta la que está corriendo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 340       # ~5.6 h; el bucle dura ~5 h y deja margen
    env:
      BASE: https://sismove-venezuela.vercel.app
      KEY: ${{ secrets.SCRAPER_WEBHOOK_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Bucle de sincronización (≈30 iteraciones · 1 cada 10 min ≈ 5 h)
        env:
          SCRAPER_WEBHOOK_URL: ${{ secrets.SCRAPER_WEBHOOK_URL }}
          SCRAPER_WEBHOOK_SECRET: ${{ secrets.SCRAPER_WEBHOOK_SECRET }}
        run: |
          for n in $(seq 1 30); do
            echo "──── iteración $n/30 · $(date -u +%H:%M) UTC ────"
            node scraper/scrape.mjs --post || true                                    # centros · sismos USGS
            curl -s "$BASE/api/sync-hospitales?key=$KEY" -o /dev/null -w "  hospitales %{http_code}\n" || true
            curl -s "$BASE/api/sync-drive?key=$KEY" -o /dev/null -w "  drive (universal) %{http_code}\n" || true
            curl -s "$BASE/api/drive-docs" -o /dev/null -w "  drive-docs %{http_code}\n" || true
            for i in $(seq 1 20); do                                                   # drena OCR de fotos nuevas
              R=$(curl -s "$BASE/api/sync-fotos?key=$KEY")
              echo "$R" | grep -q '"status":"al_dia"' && break
              sleep 2
            done
            curl -s "$BASE/api/sismo-stats?key=$KEY&refresh=1" -o /dev/null -w "  sismo-stats %{http_code}\n" || true
            curl -s "$BASE/api/cifras?key=$KEY" -o /dev/null -w "  cifras (redayuda, 30min) %{http_code}\n" || true
            curl -s "$BASE/api/notify?key=$KEY" -o /dev/null -w "  notify %{http_code}\n" || true
            [ "$n" -lt 30 ] && sleep 600                                               # 10 min hasta el siguiente
          done
